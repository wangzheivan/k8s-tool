apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: k8s-tool-agent
  labels:
    app.kubernetes.io/name: k8s-tool
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-tool
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-tool
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: k8s-tool
      hostPID: true
      containers:
        - name: k8s-tool-agent
          image: harbor.rancherlsp.com/ivan/k8s-tool:v4.1
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          ports:
            - name: http
              containerPort: 80
          env:
            - name: MODE
              value: agent
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: REFRESH_INTERVAL_SECONDS
              value: "10"
