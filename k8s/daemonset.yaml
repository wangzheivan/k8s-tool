apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: k8s-tool-agent
  labels:
    app.kubernetes.io/name: k8s-tool
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-tool
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-tool
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: k8s-tool
      hostPID: true
      tolerations:
        - key: node-role.kubernetes.io/etcd
          operator: Exists
          effect: NoExecute
        - key: node-role.kubernetes.io/etcd
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: k8s-tool-agent
          image: harbor.rancherlsp.com/ivan/k8s-tool:v4.3
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          ports:
            - name: http
              containerPort: 80
          env:
            - name: MODE
              value: agent
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: REFRESH_INTERVAL_SECONDS
              value: "10"
            - name: ETCD_CHECK_TIMEOUT_SECONDS
              value: "30"
            - name: ETCD_COMMAND_TIMEOUT_SECONDS
              value: "8"
            - name: CERT_EXPIRING_DAYS
              value: "30"
            - name: CERT_CHECK_TIMEOUT_SECONDS
              value: "20"
          volumeMounts:
            - name: rke2-data
              mountPath: /var/lib/rancher/rke2
              readOnly: true
            - name: rke2-containerd-sock
              mountPath: /run/k3s/containerd/containerd.sock
      volumes:
        - name: rke2-data
          hostPath:
            path: /var/lib/rancher/rke2
            type: DirectoryOrCreate
        - name: rke2-containerd-sock
          hostPath:
            path: /run/k3s/containerd/containerd.sock
            type: Socket
