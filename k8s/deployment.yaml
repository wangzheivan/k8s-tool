apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-tool-server
  labels:
    app.kubernetes.io/name: k8s-tool
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-tool
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-tool
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: k8s-tool
      containers:
        - name: k8s-tool-server
          image: harbor.rancherlsp.com/ivan/k8s-tool:v4.2.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: MODE
              value: server
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REFRESH_INTERVAL_SECONDS
              value: "10"
            - name: AGENT_SELECTOR
              value: app.kubernetes.io/name=k8s-tool,app.kubernetes.io/component=agent
            - name: AGENT_PORT
              value: "80"
            - name: ETCD_NODE_SELECTOR
              value: node-role.kubernetes.io/etcd
            - name: ETCD_CHECK_TIMEOUT_SECONDS
              value: "30"
            - name: ETCD_COMMAND_TIMEOUT_SECONDS
              value: "8"
