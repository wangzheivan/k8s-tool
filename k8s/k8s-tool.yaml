apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-tool
  labels:
    app.kubernetes.io/name: k8s-tool
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-tool-readonly
  labels:
    app.kubernetes.io/name: k8s-tool
rules:
  - apiGroups: [""]
    resources:
      - endpoints
      - events
      - configmaps
      - namespaces
      - nodes
      - persistentvolumes
      - persistentvolumeclaims
      - pods
      - pods/log
      - services
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiregistration.k8s.io"]
    resources:
      - apiservices
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterroles
      - clusterrolebindings
      - roles
      - rolebindings
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - volumeattachments
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.cattle.io"]
    resources:
      - helmcharts
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-tool-readonly
  labels:
    app.kubernetes.io/name: k8s-tool
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-tool-readonly
subjects:
  - kind: ServiceAccount
    name: k8s-tool
    namespace: default
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-tool-agent
  labels:
    app.kubernetes.io/name: k8s-tool
    app.kubernetes.io/component: agent
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: k8s-tool
    app.kubernetes.io/component: agent
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-tool-server
  labels:
    app.kubernetes.io/name: k8s-tool
    app.kubernetes.io/component: server
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: k8s-tool
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: k8s-tool-agent
  labels:
    app.kubernetes.io/name: k8s-tool
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-tool
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-tool
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: k8s-tool
      hostPID: true
      tolerations:
        - key: node-role.kubernetes.io/etcd
          operator: Exists
          effect: NoExecute
        - key: node-role.kubernetes.io/etcd
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: k8s-tool-agent
          image: harbor.rancherlsp.com/ivan/k8s-tool:v4.4
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          ports:
            - name: http
              containerPort: 80
          env:
            - name: MODE
              value: agent
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: REFRESH_INTERVAL_SECONDS
              value: "10"
            - name: ETCD_CHECK_TIMEOUT_SECONDS
              value: "30"
            - name: ETCD_COMMAND_TIMEOUT_SECONDS
              value: "8"
            - name: CERT_EXPIRING_DAYS
              value: "30"
            - name: CERT_CHECK_TIMEOUT_SECONDS
              value: "20"
            - name: LOG_COLLECTION_TIMEOUT_SECONDS
              value: "900"
            - name: LOG_COLLECTION_MAX_PARALLEL
              value: "3"
            - name: LOG_COLLECTION_RETENTION_HOURS
              value: "24"
          volumeMounts:
            - name: host-var-log
              mountPath: /var/log
              readOnly: true
            - name: rancher-config
              mountPath: /etc/rancher
              readOnly: true
            - name: rke2-data
              mountPath: /var/lib/rancher/rke2
              readOnly: true
            - name: rke2-containerd-sock
              mountPath: /run/k3s/containerd/containerd.sock
      volumes:
        - name: host-var-log
          hostPath:
            path: /var/log
            type: Directory
        - name: rancher-config
          hostPath:
            path: /etc/rancher
            type: Directory
        - name: rke2-data
          hostPath:
            path: /var/lib/rancher/rke2
            type: DirectoryOrCreate
        - name: rke2-containerd-sock
          hostPath:
            path: /run/k3s/containerd/containerd.sock
            type: Socket
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-tool-server
  labels:
    app.kubernetes.io/name: k8s-tool
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-tool
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-tool
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: k8s-tool
      containers:
        - name: k8s-tool-server
          image: harbor.rancherlsp.com/ivan/k8s-tool:v4.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: MODE
              value: server
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REFRESH_INTERVAL_SECONDS
              value: "10"
            - name: AGENT_SELECTOR
              value: app.kubernetes.io/name=k8s-tool,app.kubernetes.io/component=agent
            - name: AGENT_PORT
              value: "80"
            - name: ETCD_NODE_SELECTOR
              value: node-role.kubernetes.io/etcd
            - name: ETCD_CHECK_TIMEOUT_SECONDS
              value: "30"
            - name: ETCD_COMMAND_TIMEOUT_SECONDS
              value: "8"
            - name: CERT_EXPIRING_DAYS
              value: "30"
            - name: CERT_CHECK_TIMEOUT_SECONDS
              value: "20"
            - name: LOG_COLLECTION_TIMEOUT_SECONDS
              value: "900"
            - name: LOG_COLLECTION_MAX_PARALLEL
              value: "3"
            - name: LOG_COLLECTION_RETENTION_HOURS
              value: "24"
